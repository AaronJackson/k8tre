---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-all-selected-namespaces
spec:
  # Selects all pods in this namespace
  endpointSelector:
    matchExpressions:
      - key: "k8s:io.kubernetes.pod.namespace"
        operator: In
        values:
          - kube-system
  ingress:
    - fromEntities:
        - all
  egress:
    - toEntities:
        - all

---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: k8tre-default-network-policy
spec:
  # Every pod except those in kube-system
  endpointSelector:
    matchExpressions:
      - key: "k8s:io.kubernetes.pod.namespace"
        operator: NotIn
        values:
          - kube-system
  egress:
    - toEntities:
        - cluster
    - toCIDR:
        # TODO: For now allow all traffic to VPC
        - 10.0.0.0/16
    - toFQDNs:
        # TODO: narrow this down
        - matchPattern: "**.amazonaws.com"
        - matchPattern: "**.${DOMAIN}"
    # Need to force DNS via Cilium
    # https://docs.cilium.io/en/stable/security/policy/language/#dns-obtaining-data
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              # TODO: narrow this down
              - matchPattern: "*"
  # ingress:
  #   - fromEntities:
  #       - cluster
  #       - world
