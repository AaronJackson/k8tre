apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: samba-ad-data
  namespace: ad
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: samba
  namespace: ad
automountServiceAccountToken: true

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: samba
  namespace: ad
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "update", "get", "list", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: samba
  namespace: ad
subjects:
  - kind: ServiceAccount
    name: samba
    namespace: ad
roleRef:
  kind: Role
  name: samba
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: samba
  namespace: ad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: samba
  template:
    metadata:
      labels:
        app: samba
    spec:
      hostname: dc0      
      volumes:
        - name: samba-ad-data
          persistentVolumeClaim:
            claimName: samba-ad-data
        - name: samba-init
          configMap:
            name: samba-init-scripts
            defaultMode: 0770
        - name: krb5
          configMap:
            name: krb5.conf
            defaultMode: 0444            
      serviceAccountName: samba
      initContainers:
        - name: samba-config
          image: docker.io/library/samba-dc:latest
          imagePullPolicy: Never
          volumeMounts:
            - name: samba-ad-data
              mountPath: /samba
            - name: samba-init
              mountPath: /samba-init.sh
              subPath: samba-init.sh
            - name: krb5
              subPath: config
              mountPath: /etc/krb5.conf              
          securityContext:
            # Unfortunately this is needed due to the way Samba manages ACLs.
            privileged: true
            allowPrivilegeEscalation: true
          command:
            - "/samba-init.sh"
      containers:
        - name: samba          
          image: docker.io/library/samba-dc:latest
          imagePullPolicy: Never
          volumeMounts:
            - name: samba-ad-data
              mountPath: /samba
            - name: krb5
              subPath: config
              mountPath: /etc/krb5.conf              
          securityContext:
            # Unfortunately this is needed due to the way Samba manages ACLs.
            privileged: true
            allowPrivilegeEscalation: true
          ports:
            - containerPort: 37
              protocol: UDP
            - containerPort: 53
            - containerPort: 88
            - containerPort: 135
              protocol: TCP
            - containerPort: 137
              protocol: UDP
            - containerPort: 138
              protocol: UDP
            - containerPort: 139
            - containerPort: 389
            - containerPort: 445
            - containerPort: 464
            - containerPort: 636
              protocol: TCP
            - containerPort: 3268
              protocol: TCP
            - containerPort: 3269
              protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: samba
  namespace: ad
spec:
  selector:
    app: samba
  ports:
    - name: time
      port: 37
      targetPort: 37
      protocol: UDP
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP      
    - name: kerberos-udp
      port: 88
      targetPort: 88
      protocol: UDP
    - name: kerberos-tcp
      port: 88
      targetPort: 88
      protocol: TCP      
    - name: rpc
      port: 135
      targetPort: 135
      protocol: TCP
    - name: nbns
      port: 137
      targetPort: 137
      protocol: UDP
    - name: nbds
      port: 138
      targetPort: 138
      protocol: UDP
    - name: nbss-udp
      port: 139
      targetPort: 139
      protocol: UDP
    - name: nbss-tcp
      port: 139
      targetPort: 139
      protocol: TCP
    - name: ldap
      port: 389
      targetPort: 389
      protocol: TCP
    - name: smb
      port: 445
      targetPort: 445
      protocol: TCP
    - name: kpasswd
      port: 464
      targetPort: 464
      protocol: TCP
    - name: ldaps
      port: 636
      targetPort: 636
      protocol: TCP
    - name: ldap-gc
      port: 3268
      targetPort: 3268
      protocol: TCP
    - name: ldaps-gc
      port: 3269
      targetPort: 3269
      protocol: TCP      
      
